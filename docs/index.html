<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prometheus Portfolio Dashboard</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0f1216; color: #e8eaed; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .card { background: #1a1f26; border: 1px solid #2a313a; border-radius: 8px; }
    .status-ALIVE { background: #134e1f; color: #6ee29c; }
    .status-STALE { background: #5b4720; color: #ffd966; }
    .status-DEAD { background: #5b1f1f; color: #ff8a8a; }
    .status-OFFLINE { background: #2a313a; color: #8b95a3; }
    .status-MISSING { background: #1a1f26; color: #5a6470; border: 1px solid #2a313a; }
    .status-NO_HEARTBEAT, .status-BAD_HEARTBEAT { background: #4a2c5b; color: #c08fff; }
    .pill { padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; letter-spacing: 0.5px; }
    .machine-M1 { color: #6cc7ff; } .machine-M2 { color: #ffb86c; } .machine-M3 { color: #ff79c6; } .machine-M4 { color: #50fa7b; }
    .machine-other { color: #8b95a3; }
    .hover-row:hover { background: #1f2630; }
    .anomaly-banner { background: linear-gradient(90deg, #5b1f1f 0%, #3a1717 100%); border-left: 4px solid #ff5555; }
    pre { white-space: pre-wrap; word-break: break-word; }
    .scroll-y { overflow-y: auto; max-height: 400px; }
    /* scrollbar */
    .scroll-y::-webkit-scrollbar { width: 8px; }
    .scroll-y::-webkit-scrollbar-track { background: #1a1f26; }
    .scroll-y::-webkit-scrollbar-thumb { background: #3a4150; border-radius: 4px; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback } = React;

function formatAge(seconds) {
  if (seconds == null) return "—";
  if (seconds < 60) return `${seconds}s`;
  if (seconds < 3600) return `${Math.floor(seconds / 60)}m`;
  if (seconds < 86400) return `${Math.floor(seconds / 3600)}h`;
  return `${Math.floor(seconds / 86400)}d`;
}

function machineClass(m) {
  if (["M1", "M2", "M3", "M4"].includes(m)) return `machine-${m}`;
  return "machine-other";
}

function statusOrder(s) {
  return { ALIVE: 0, STALE: 1, DEAD: 2, OFFLINE: 3, MISSING: 4 }[s] ?? 5;
}

function AgentRow({ a }) {
  return (
    <tr className="hover-row border-b border-gray-800">
      <td className="px-3 py-2">
        <span className="font-semibold">{a.name}</span>
        {!a.expected && <span className="ml-2 text-xs text-gray-500">(unexpected)</span>}
      </td>
      <td className={`px-3 py-2 ${machineClass(a.machine)}`}>{a.machine}</td>
      <td className="px-3 py-2 text-gray-400 text-sm">{a.kind}</td>
      <td className="px-3 py-2">
        <span className={`pill status-${a.status}`}>{a.status}</span>
      </td>
      <td className="px-3 py-2 text-sm font-mono text-gray-400">{formatAge(a.heartbeat_age_sec)}</td>
      <td className="px-3 py-2 text-sm text-gray-300 truncate max-w-md" title={a.current_op}>{a.current_op || "—"}</td>
    </tr>
  );
}

function StreamEvent({ e }) {
  return (
    <div className="text-sm border-l-2 border-gray-700 pl-3 py-1 mb-1">
      <div className="flex justify-between items-center text-xs text-gray-500">
        <span>
          <span className={machineClass(e.machine)}>{e.sender}</span>@{e.machine}
          {" · "}<span className="text-gray-400">{e.type}</span>
          {e.confidence && <span className="ml-1 text-gray-500">(conf={e.confidence})</span>}
        </span>
        <span>{e.timestamp}</span>
      </div>
      <div className="text-gray-200 mt-0.5"><strong>{e.subject}</strong></div>
      {e.body && <div className="text-gray-400 text-xs mt-0.5">{e.body}</div>}
    </div>
  );
}

function Dashboard() {
  const [state, setState] = useState(null);
  const [brief, setBrief] = useState("");
  const [error, setError] = useState(null);
  const [lastFetch, setLastFetch] = useState(null);

  const load = useCallback(async () => {
    try {
      const buster = Date.now();
      const [stateResp, briefResp] = await Promise.all([
        fetch(`state.json?t=${buster}`),
        fetch(`portfolio_brief.md?t=${buster}`),
      ]);
      if (!stateResp.ok) throw new Error(`state.json: ${stateResp.status}`);
      setState(await stateResp.json());
      setBrief(briefResp.ok ? await briefResp.text() : "(no brief yet — run `python scripts/metis_portfolio.py`)");
      setLastFetch(new Date());
      setError(null);
    } catch (e) {
      setError(e.message);
    }
  }, []);

  useEffect(() => {
    load();
    const t = setInterval(load, 60_000); // refresh every minute
    return () => clearInterval(t);
  }, [load]);

  if (error) {
    return (
      <div className="p-8">
        <h1 className="text-2xl font-bold mb-4">Prometheus Portfolio Dashboard</h1>
        <div className="card p-4 anomaly-banner">
          <strong>Failed to load state.json:</strong> {error}
          <div className="text-sm mt-2 text-gray-400">
            Run <code className="bg-gray-800 px-2 py-0.5 rounded">python scripts/portfolio_monitor.py --once</code> to regenerate.
          </div>
        </div>
      </div>
    );
  }

  if (!state) {
    return <div className="p-8 text-gray-400">Loading state…</div>;
  }

  const agents = [...state.agents].sort((a, b) => {
    const so = statusOrder(a.status) - statusOrder(b.status);
    if (so !== 0) return so;
    return a.name.localeCompare(b.name);
  });
  const aliveCount = agents.filter(a => a.status === "ALIVE").length;
  const deadCount = agents.filter(a => a.expected && (a.status === "DEAD" || a.status === "STALE")).length;
  const wq = state.work_queue || {};

  return (
    <div className="p-6 max-w-7xl mx-auto">
      <header className="mb-6 flex justify-between items-start">
        <div>
          <h1 className="text-2xl font-bold">Prometheus Portfolio Dashboard</h1>
          <div className="text-sm text-gray-500 mt-1">
            Redis: <span className="font-mono">{state.redis_host}</span>
            {" · "}heartbeat timeout {state.heartbeat_timeout_sec}s
            {" · "}schema v{state.schema_version}
          </div>
        </div>
        <div className="text-right text-sm text-gray-500">
          <div>Snapshot: <span className="font-mono">{state.generated_at}</span></div>
          {lastFetch && <div>Loaded: {lastFetch.toLocaleTimeString()}</div>}
          <button onClick={load} className="mt-1 px-3 py-1 text-xs bg-gray-700 hover:bg-gray-600 rounded">↻ Refresh</button>
        </div>
      </header>

      {state.infra_status && (
        <div className="card p-4 mb-6" style={{background: "linear-gradient(90deg, #5b4720 0%, #3a3617 100%)", borderLeft: "4px solid #ffd966"}}>
          <div className="font-semibold mb-2">
            ⚠ Infrastructure Degraded — Redis: {state.infra_status.redis}
            {state.infra_status.postgres && (
              <span className="ml-2 text-sm text-gray-300">· Postgres: {state.infra_status.postgres}</span>
            )}
            {state.infra_status.fallback_mode && (
              <span className="ml-2 text-sm text-gray-300">· fallback: {state.infra_status.fallback_mode}</span>
            )}
          </div>
          <div className="text-sm text-gray-200">{state.infra_status.note}</div>
          {state.infra_status.postgres_agent_count !== undefined && (
            <div className="text-xs text-gray-400 mt-1">
              {state.infra_status.postgres_agent_count} agent(s) sourced from Postgres mirror
            </div>
          )}
          {state.infra_status.redis_error && (
            <div className="text-xs text-gray-500 mt-1 font-mono">redis_error: {state.infra_status.redis_error}</div>
          )}
        </div>
      )}

      {state.anomalies && state.anomalies.length > 0 && (
        <div className="card anomaly-banner p-4 mb-6">
          <div className="font-semibold mb-2">⚠ Anomalies ({state.anomalies.length})</div>
          {state.anomalies.map((a, i) => (
            <div key={i} className="text-sm">
              <span className="font-semibold">{a.agent}</span>: {a.kind} — {a.detail}
            </div>
          ))}
        </div>
      )}

      <div className="grid grid-cols-4 gap-4 mb-6">
        <div className="card p-3">
          <div className="text-xs text-gray-500 uppercase tracking-wide">Alive</div>
          <div className="text-3xl font-bold text-green-400">{aliveCount}</div>
        </div>
        <div className="card p-3">
          <div className="text-xs text-gray-500 uppercase tracking-wide">Dead / Stale</div>
          <div className="text-3xl font-bold text-red-400">{deadCount}</div>
        </div>
        <div className="card p-3">
          <div className="text-xs text-gray-500 uppercase tracking-wide">Queue Depth</div>
          <div className="text-3xl font-bold">{wq.queued ?? 0}</div>
          <div className="text-xs text-gray-500">claimed {wq.claimed ?? 0}</div>
        </div>
        <div className="card p-3">
          <div className="text-xs text-gray-500 uppercase tracking-wide">Lifetime Completed</div>
          <div className="text-3xl font-bold">{wq.completed_lifetime ?? 0}</div>
        </div>
      </div>

      <div className="card mb-6">
        <div className="px-4 py-2 border-b border-gray-800 text-sm font-semibold">Agents ({agents.length})</div>
        <table className="w-full text-sm">
          <thead className="bg-gray-900 text-gray-400 text-xs uppercase">
            <tr>
              <th className="px-3 py-2 text-left">Name</th>
              <th className="px-3 py-2 text-left">Machine</th>
              <th className="px-3 py-2 text-left">Kind</th>
              <th className="px-3 py-2 text-left">Status</th>
              <th className="px-3 py-2 text-left">HB Age</th>
              <th className="px-3 py-2 text-left">Current Op</th>
            </tr>
          </thead>
          <tbody>
            {agents.map(a => <AgentRow key={a.name} a={a} />)}
          </tbody>
        </table>
      </div>

      <div className="grid grid-cols-2 gap-4 mb-6">
        <div className="card p-4">
          <div className="text-sm font-semibold mb-2">Recent Discoveries ({(state.discoveries || []).length})</div>
          <div className="scroll-y">
            {(state.discoveries || []).map((e, i) => <StreamEvent key={i} e={e} />)}
            {(state.discoveries || []).length === 0 && <div className="text-gray-500 text-sm">(none)</div>}
          </div>
        </div>
        <div className="card p-4">
          <div className="text-sm font-semibold mb-2">Recent Main Stream ({(state.main_events || []).length})</div>
          <div className="scroll-y">
            {(state.main_events || []).map((e, i) => <StreamEvent key={i} e={e} />)}
            {(state.main_events || []).length === 0 && <div className="text-gray-500 text-sm">(none)</div>}
          </div>
        </div>
      </div>

      <div className="card p-4">
        <div className="text-sm font-semibold mb-2">Latest Metis Brief</div>
        <pre className="text-xs text-gray-300 scroll-y bg-gray-900 p-3 rounded">{brief}</pre>
      </div>

      <footer className="mt-6 text-center text-xs text-gray-600">
        <a href="https://github.com/jcraig949jfi/Prometheus" target="_blank" className="hover:text-gray-400">Prometheus</a>
        {" · auto-refresh every 60s · "}
        run <code className="text-gray-500">scripts/portfolio_monitor.py</code> + <code className="text-gray-500">scripts/metis_portfolio.py</code> to refresh data
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Dashboard />);
</script>
</body>
</html>
