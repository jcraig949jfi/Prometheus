# ============================================================
# APOLLO-BETA — Breadth-First Generalist (M2)
# ============================================================
# Strategy: Wide, shallow compositions targeting maximum
# category coverage. Many primitives in parallel branches
# with majority-vote integration. Optimizes for solving the
# MOST problem types, not solving any one deeply.
#
# Key differences from Alpha (M1):
#   - mutation_rates: route 0.20 (vs 0.40), wiring 0.35 (vs 0.20)
#   - llm_temperature: 0.8 (vs 0.7) — more exploratory
#   - novelty_archive_threshold: 0.3 (vs 0.05) — broader archive
# ============================================================

apollo:
  # ── Instance identity ───────────────────────────────────────────
  island_id: "beta"
  instance_name: "Apollo-Beta (Breadth Generalist)"

  # ── Paths (relative to project root for dirs, absolute for shared) ──
  primitives_dir: "agents/hephaestus/src"
  trap_generator: "agents/hephaestus/src/trap_generator.py"
  gem_dirs:
    - "agents/hephaestus/forge_v9/*.py"
    - "forge/candidates/*gem*.py"
    - "agents/hephaestus/forge_v7/*specialist*.py"

  # Output directories (relative to apollo-v2/)
  log_dir: "logs"
  checkpoint_dir: "checkpoints"
  lineage_dir: "lineage"
  graveyard_dir: "graveyard"
  dashboard_dir: "dashboard"

  # Shared atom pool — Skullport network share
  shared_pool: "\\\\SKULLPORT\\skullport_shared\\apollo_pool"

  # ── Population ────────────────────────────────────────────────
  population_size: 50
  offspring_per_generation: 50
  elite_count: 5

  # ── Mutation rates (Beta: wiring-heavy, less route) ───────────
  mutation_rates:
    route: 0.20        # Alpha: 0.40 — Beta explores wiring instead
    parameter: 0.25    # same as Alpha
    wiring: 0.35       # Alpha: 0.20 — Beta rewires more aggressively
    swap: 0.20         # Alpha: 0.15 — Beta swaps primitives more
  drift_sigma: 0.02
  crossover_rate: 0.3

  # ── Phase schedule ────────────────────────────────────────────
  warmup_generations: 50
  accuracy_activation_gen: 50
  ablation_activation_gen: 100
  params_only_until_gen: 50

  # ── Selection ─────────────────────────────────────────────────
  selection_algorithm: "nsga2"
  fitness_objectives: 6

  # ── NCD counterpressure ───────────────────────────────────────
  ncd_min_differ: 3

  # ── Ablation gate ─────────────────────────────────────────────
  ablation_interval: 5
  ablation_threshold: 0.20

  # ── Novelty ───────────────────────────────────────────────────
  novelty_k_nearest: 15
  novelty_archive_threshold: 0.3   # Alpha: 0.05 — Beta has broader archive
  novelty_archive_max_size: 500

  # ── Tasks (v2: scaled curriculum) ─────────────────────────────
  n_reference_tasks: 50
  n_evolution_tasks: 100
  n_held_out_tasks: 50
  rotation_count: 10
  task_rotation_interval: 50
  quick_screen_count: 3

  # ── Sandbox ───────────────────────────────────────────────────
  sandbox_timeout_seconds: 0.5

  # ── LLM mutation (Beta: higher temp for exploration) ──────────
  llm_model: "Qwen/Qwen2.5-Coder-7B-Instruct"
  llm_device: "cuda"
  llm_max_tokens: 2048             # Alpha: 512 — Beta gets longer mutations
  llm_temperature: 0.8             # Alpha: 0.7 — Beta explores more
  llm_load_in_8bit: true

  # ── Operational ───────────────────────────────────────────────
  checkpoint_interval: 10
  checkpoint_keep_last: 5
  held_out_eval_interval: 10
  max_generations: 50000
