agent:
  name: nemesis
  display_name: "Nemesis — Adversarial Co-Evolution Engine"
  version: "0.1.0"
  description: >
    Goddess of retribution. Generates adversarial tasks using formal metamorphic
    relations, organizes them in a MAP-Elites quality-diversity grid, finds minimal
    failing cases, and produces failure reports for Coeus. Answers: "Are our
    evaluators measuring reasoning, or have they learned to pass tests?"

runtime:
  python: ">=3.10"
  dependencies:
    - numpy

input:
  forge_tools: "../hephaestus/forge/"
  seed_traps: "../hephaestus/src/test_harness.py"
  trap_generator: "../hephaestus/src/trap_generator.py"

output:
  grid: "grid/grid.json"
  reports: "reports/"
  adversarial_results: "adversarial/adversarial_results.jsonl"

parameters:
  grid_size: 10
  n_random_per_cycle: 50
  n_targeted_per_cycle: 30
  poll_interval: 120
  novelty_threshold: 0.15
