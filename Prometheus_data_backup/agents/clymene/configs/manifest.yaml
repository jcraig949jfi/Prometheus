# Clymene — Hoard Manifest
# What to archive before the open-source window closes.
#
# vault_root: where cloned repos / downloaded models land.
#   Relative paths are resolved from the Prometheus project root.
#   Override with CLYMENE_VAULT_ROOT env var.

vault_root: vault

# ───────────────────────────────────────────────────────────────
# Repos — git clone targets
# ───────────────────────────────────────────────────────────────
repos:

  # ---------- Tensor / Math ----------
  - name: THOR
    url: https://github.com/lanl/thor
    category: tensor
    tags: [tensor-train, decomposition, lanl]
    priority: high
    notes: "Tensor train decomposition from Los Alamos — core to RPH subspace work"

  - name: TensorLy
    url: https://github.com/tensorly/tensorly
    category: tensor
    tags: [tensor, decomposition, CP, Tucker]
    priority: high
    notes: "Gold-standard tensor decomposition library"

  - name: opt-einsum
    url: https://github.com/dgasmith/opt_einsum
    category: tensor
    tags: [tensor, contraction, einsum, optimization]
    priority: high
    notes: "Optimal tensor contraction ordering"

  - name: quimb
    url: https://github.com/jcmgray/quimb
    category: tensor
    tags: [tensor-network, quantum, contraction]
    priority: medium
    notes: "Tensor network library with advanced contraction"

  - name: TensorNetwork
    url: https://github.com/google/TensorNetwork
    category: tensor
    tags: [tensor-network, google, TN]
    priority: medium
    notes: "Google's tensor network library — TensorFlow and JAX backends"

  - name: tensorly-torch
    url: https://github.com/tensorly/torch
    category: tensor
    tags: [tensor, decomposition, pytorch]
    priority: medium
    notes: "PyTorch backend for TensorLy — differentiable tensor decompositions"

  # ---------- Mech Interp ----------
  - name: SAELens
    url: https://github.com/jbloomAus/SAELens
    category: mech-interp
    tags: [SAE, sparse-autoencoder, features, interp]
    priority: high
    notes: "Sparse autoencoder training and analysis — central to Ignis"

  - name: TransformerLens
    url: https://github.com/TransformerLensOrg/TransformerLens
    category: mech-interp
    tags: [interp, hooks, activation-patching, circuits]
    priority: high
    notes: "The standard mech-interp toolkit"

  - name: pyvene
    url: https://github.com/stanfordnlp/pyvene
    category: mech-interp
    tags: [intervention, causal-tracing, Stanford]
    priority: high
    notes: "Stanford intervention framework — activation steering at scale"

  - name: repeng
    url: https://github.com/vgel/repeng
    category: mech-interp
    tags: [steering-vectors, representation-engineering]
    priority: high
    notes: "Representation engineering / steering vectors"

  - name: baukit
    url: https://github.com/davidbau/baukit
    category: mech-interp
    tags: [probing, visualization, hooks]
    priority: medium
    notes: "David Bau's interp toolkit — trace, hook, visualize"

  - name: circuitsvis
    url: https://github.com/alan-cooney/CircuitsVis
    category: mech-interp
    tags: [visualization, attention, circuits]
    priority: medium
    notes: "Interactive circuit visualisation for transformer interp"

  - name: nnsight
    url: https://github.com/ndif-team/nnsight
    category: mech-interp
    tags: [interp, remote-inference, intervention]
    priority: medium
    notes: "Remote neural network inspection and intervention"

  # ---------- Evolutionary Algorithms ----------
  - name: EvoTorch
    url: https://github.com/nnaisense/evotorch
    category: evolutionary
    tags: [evolution, GPU, neuroevolution, CMA-ES]
    priority: high
    notes: "GPU-accelerated evolutionary algorithms — key for RPH search"

  - name: pyribs
    url: https://github.com/icaros-usc/pyribs
    category: evolutionary
    tags: [quality-diversity, MAP-Elites, CMA-MAE]
    priority: high
    notes: "Quality-diversity optimization — MAP-Elites and variants"

  - name: evosax
    url: https://github.com/RobertTLange/evosax
    category: evolutionary
    tags: [evolution, JAX, CMA-ES, ES]
    priority: medium
    notes: "JAX-based evolution strategies — very fast on GPU"

  - name: qdax
    url: https://github.com/adaptive-intelligent-robotics/QDax
    category: evolutionary
    tags: [quality-diversity, JAX, MAP-Elites]
    priority: medium
    notes: "Quality-diversity in JAX — hardware-accelerated MAP-Elites"

  # ---------- Agent Frameworks ----------
  - name: CrewAI
    url: https://github.com/crewAIInc/crewAI
    category: agents
    tags: [multi-agent, orchestration, roles]
    priority: medium
    notes: "Multi-agent orchestration framework"

  - name: NemoClaw
    url: https://github.com/NVIDIA/NemoClaw
    category: agents
    tags: [sandbox, containers, NVIDIA, tool-use]
    priority: medium
    notes: "Sandboxed agent containers from NVIDIA"

  - name: autogen
    url: https://github.com/microsoft/autogen
    category: agents
    tags: [multi-agent, Microsoft, conversation]
    priority: medium
    notes: "Microsoft multi-agent conversation framework"

  - name: dspy
    url: https://github.com/stanfordnlp/dspy
    category: agents
    tags: [prompting, optimization, Stanford]
    priority: medium
    notes: "Declarative LM pipelines — prompt optimization"

  # ---------- Datasets / Knowledge ----------
  - name: paperetl
    url: https://github.com/neuml/paperetl
    category: datasets
    tags: [papers, ETL, bulk-access]
    priority: medium
    notes: "ETL pipeline for scientific papers"

  - name: semanticscholar-python
    url: https://github.com/danielnsilva/semanticscholar
    category: datasets
    tags: [semantic-scholar, API, citation-graph]
    priority: medium
    notes: "Python wrapper for Semantic Scholar API"

  - name: openalex-python
    url: https://github.com/J535D165/pyalex
    category: datasets
    tags: [OpenAlex, API, papers, citations]
    priority: medium
    notes: "Python client for OpenAlex — open scholarly metadata"

  - name: galai
    url: https://github.com/paperswithcode/galai
    category: datasets
    tags: [scientific-LM, papers, Meta]
    priority: low
    notes: "Galactica model API — scientific text generation"

  - name: arxiv-sanity-lite
    url: https://github.com/karpathy/arxiv-sanity-lite
    category: datasets
    tags: [arxiv, recommendation, papers]
    priority: low
    notes: "Karpathy's arxiv recommendation engine"


# ───────────────────────────────────────────────────────────────
# Models — HuggingFace model tracking
# ───────────────────────────────────────────────────────────────
models:

  # ---------- Qwen family ----------
  - hf_id: Qwen/Qwen2.5-0.5B
    arch_family: qwen2
    param_count: 0.5B
    vram_estimate_gb: 1.5
    tags: [tiny, baseline, embedding-probe]
    priority: high
    notes: "Smallest Qwen — fast iteration target for Ignis"

  - hf_id: Qwen/Qwen2.5-1.5B
    arch_family: qwen2
    param_count: 1.5B
    vram_estimate_gb: 4
    tags: [small, scale-gradient]
    priority: high
    notes: "Scale gradient datapoint"

  - hf_id: Qwen/Qwen2.5-3B
    arch_family: qwen2
    param_count: 3B
    vram_estimate_gb: 7
    tags: [medium, scale-gradient]
    priority: high
    notes: "Scale gradient datapoint"

  - hf_id: Qwen/Qwen2.5-7B
    arch_family: qwen2
    param_count: 7B
    vram_estimate_gb: 16
    tags: [medium, reasoning]
    priority: medium
    notes: "Good reasoning baseline"

  - hf_id: Qwen/Qwen2.5-14B
    arch_family: qwen2
    param_count: 14B
    vram_estimate_gb: 28
    tags: [large, reasoning, frontier-local]
    priority: low
    notes: "Needs full 28GB — quantize or skip if tight"

  - hf_id: Qwen/Qwen3-4B
    arch_family: qwen3
    param_count: 4B
    vram_estimate_gb: 9
    tags: [next-gen, architecture-diversity]
    priority: high
    notes: "New Qwen3 arch — compare RPH signatures with Qwen2"

  # ---------- Llama family ----------
  - hf_id: meta-llama/Llama-3.2-1B
    arch_family: llama3
    param_count: 1B
    vram_estimate_gb: 3
    tags: [tiny, scale-gradient, Meta]
    priority: high
    notes: "Smallest Llama 3 — cross-family RPH comparison"

  - hf_id: meta-llama/Llama-3.2-3B
    arch_family: llama3
    param_count: 3B
    vram_estimate_gb: 7
    tags: [small, scale-gradient, Meta]
    priority: high
    notes: "Scale gradient cross-family"

  - hf_id: meta-llama/Llama-3.1-8B
    arch_family: llama3
    param_count: 8B
    vram_estimate_gb: 17
    tags: [medium, reasoning, Meta]
    priority: medium
    notes: "Standard Llama 3 — well-studied baseline"

  # ---------- Mistral ----------
  - hf_id: mistralai/Mistral-7B-v0.3
    arch_family: mistral
    param_count: 7B
    vram_estimate_gb: 15
    tags: [medium, sliding-window, architecture-diversity]
    priority: medium
    notes: "Sliding-window attention — different attention pattern for RPH"

  # ---------- Gemma family ----------
  - hf_id: google/gemma-2-2b
    arch_family: gemma2
    param_count: 2B
    vram_estimate_gb: 5
    tags: [small, Google, architecture-diversity]
    priority: high
    notes: "Google arch — logit soft-capping, unique interp target"

  - hf_id: google/gemma-2-9b
    arch_family: gemma2
    param_count: 9B
    vram_estimate_gb: 20
    tags: [medium, Google, architecture-diversity]
    priority: medium
    notes: "Larger Gemma for scale comparison"

  # ---------- Phi family ----------
  - hf_id: microsoft/phi-3-mini-4k-instruct
    arch_family: phi3
    param_count: 3.8B
    vram_estimate_gb: 8
    tags: [small, Microsoft, high-quality-data]
    priority: high
    notes: "Phi-3 — trained on curated data, interesting RPH contrast"

  - hf_id: microsoft/Phi-4-mini-instruct
    arch_family: phi4
    param_count: 3.8B
    vram_estimate_gb: 9
    tags: [small, Microsoft, next-gen]
    priority: medium
    notes: "Phi-4 mini — new arch generation from Microsoft"

  # ---------- DeepSeek ----------
  - hf_id: deepseek-ai/DeepSeek-R1-Distill-Qwen-1.5B
    arch_family: deepseek-r1-distill
    param_count: 1.5B
    vram_estimate_gb: 4
    tags: [small, reasoning-distill, CoT]
    priority: high
    notes: "R1 reasoning distilled into small model — does RPH survive distillation?"

  - hf_id: deepseek-ai/DeepSeek-R1-Distill-Qwen-7B
    arch_family: deepseek-r1-distill
    param_count: 7B
    vram_estimate_gb: 15
    tags: [medium, reasoning-distill, CoT]
    priority: medium
    notes: "Larger R1 distill — reasoning depth comparison"

  # ---------- StableLM ----------
  - hf_id: stabilityai/stablelm-2-1_6b
    arch_family: stablelm
    param_count: 1.6B
    vram_estimate_gb: 4
    tags: [small, StabilityAI, architecture-diversity]
    priority: medium
    notes: "StableLM — different training recipe, interp diversity"

  # ---------- RWKV (linear attention) ----------
  - hf_id: RWKV/rwkv-6-world-1b6
    arch_family: rwkv6
    param_count: 1.6B
    vram_estimate_gb: 4
    tags: [small, linear-attention, non-transformer, architecture-diversity]
    priority: high
    notes: "RWKV-6 — linear attention, fundamentally different from transformers. Does RPH even apply?"

  - hf_id: RWKV/rwkv-6-world-3b
    arch_family: rwkv6
    param_count: 3B
    vram_estimate_gb: 7
    tags: [medium, linear-attention, non-transformer]
    priority: medium
    notes: "Larger RWKV for scale gradient on non-transformer"

  # ---------- Mamba (state-space) ----------
  - hf_id: state-spaces/mamba-2.8b-hf
    arch_family: mamba
    param_count: 2.8B
    vram_estimate_gb: 7
    tags: [medium, SSM, non-transformer, architecture-diversity]
    priority: high
    notes: "Mamba SSM — no attention at all. Critical architecture diversity for RPH"


# ───────────────────────────────────────────────────────────────
# Datasets — bulk archives
# ───────────────────────────────────────────────────────────────
datasets:

  - name: semantic-scholar-cs-papers
    source_url: https://api.semanticscholar.org/datasets/v1/release/latest
    size_estimate: "~200GB compressed"
    tags: [papers, citations, CS, bulk]
    priority: medium
    notes: "Semantic Scholar bulk dataset — CS papers with citation graph"

  - name: openalex-snapshot
    source_url: https://docs.openalex.org/download-all-data/openalex-snapshot
    size_estimate: "~350GB compressed"
    tags: [papers, citations, metadata, bulk]
    priority: low
    notes: "OpenAlex full snapshot — all scholarly works. Very large."

  - name: pile-uncopyrighted
    source_url: https://huggingface.co/datasets/monology/pile-uncopyrighted
    size_estimate: "~200GB"
    tags: [pretraining, text, diverse]
    priority: low
    notes: "Uncopyrighted subset of The Pile — useful for probing experiments"

  - name: neuronpedia-sae-features
    source_url: https://www.neuronpedia.org/
    size_estimate: "~5GB"
    tags: [mech-interp, SAE, features, ground-truth]
    priority: high
    notes: "Neuronpedia SAE feature dashboards — ground truth for interp work"

  - name: alpaca-eval
    source_url: https://huggingface.co/datasets/tatsu-lab/alpaca_eval
    size_estimate: "<100MB"
    tags: [eval, instruction-following, benchmark]
    priority: medium
    notes: "Instruction-following eval set — useful for RPH behavioral probes"

  - name: openwebmath
    source_url: https://huggingface.co/datasets/open-web-math/open-web-math
    size_estimate: "~15GB"
    tags: [math, pretraining, reasoning]
    priority: medium
    notes: "High-quality math text — useful for reasoning probes"

  # ---------- Agentic Research ----------
  - name: IRIS
    url: https://github.com/Anikethh/IRIS-Interactive-Research-Ideation-System
    category: agentic-research
    tags: [MCTS, hypothesis-generation, ideation, HITL, ACL-2025]
    priority: high
    notes: "MCTS-based hypothesis generation — three-agent architecture (ideation, review, retrieval). Potential backbone for automated theory generation pipeline in Prometheus."

  - name: DeerFlow
    url: https://github.com/bytedance/deer-flow
    category: agentic-research
    tags: [multi-agent, orchestration, LangGraph, bytedance]
    priority: low
    notes: "ByteDance super agent harness — good infrastructure reference but generic, not science-specific"
