name: Deploy docs/ to GitHub Pages

# Replaces the auto-generated Pages workflow (which fails because the repo
# has an orphan submodule gitlink at cartography/mathlib/mathlib4_source
# with no .gitmodules entry). This workflow checks out without recursing
# submodules, then publishes docs/ verbatim.

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4
