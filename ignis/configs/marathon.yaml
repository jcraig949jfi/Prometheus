# Ignis Marathon Configuration — Multi-Model Cycle
# Each model gets its own results subdirectory and CMA-ES state.
# The pipeline rotates through all models continuously, looking for fire.

results_dir: "results/ignis"
population_size: 40
mutation_rate: 0.03           # Global default sigma (overridable per-model)
seed_norm: 3.0                # Inception seed & baseline vector magnitude.
                              # Default 3.0 avoids the "Hallucination Zone" for
                              # small models (≤1B). Larger models may use 5.0+.
                              # Per-model override: seed_norm_override in models[].
cycle_continuously: true      # Loop forever through the model list

# Google Drive sync — set to null or remove to disable
sync_output_dir: "G:\\My Drive\\Prometheus\\ignis\\output"

