# Aletheia Configuration — Knowledge Harvesting & Taxonomy Agent
# Processes papers found by Eos and extracts structured entities into a knowledge graph.

cerebras:
  model: "qwen-3-235b"          # free tier (alias — resolved at runtime)
  max_tokens: 2048
  temperature: 0.1
  fallback_model: "llama-3.3-70b"

nim:
  model: "meta/llama-3.1-405b-instruct"
  fallback: true

paths:
  eos_paper_index: "agents/eos/data/paper_index.json"
  knowledge_db: "agents/aletheia/data/knowledge_graph.db"
  review_queue: "agents/aletheia/data/review_queue.json"
  exports_dir: "agents/aletheia/exports/"

processing:
  batch_size: 60                # papers per run
  min_score_threshold: 0.3      # only process papers above this Eos score
  conflict_similarity_threshold: 0.85  # flag for review if name similarity exceeds this

logging:
  level: INFO
  log_file: "agents/aletheia/aletheia.log"
