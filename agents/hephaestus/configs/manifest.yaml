agent:
  name: hephaestus
  display_name: "Hephaestus — The Automated Forge"
  version: "0.1.0"
  description: >
    Takes raw concept combinations from Nous (scored theoretical descriptions
    of novel idea intersections), hammers them into testable Python code,
    validates the code, and runs it against a trap battery to measure whether
    the concept actually improves reasoning.

runtime:
  python: ">=3.10"
  dependencies:
    - openai
    - pyyaml

api:
  provider: nvidia
  endpoint: "https://integrate.api.nvidia.com/v1/chat/completions"
  default_model: "qwen/qwen3.5-397b-a17b"
  auth_env: NVIDIA_API_KEY

parameters:
  rate_limit_delay: 3.0
  max_retries: 5
  backoff_base: 2.0
  checkpoint_interval: 5
  default_top_n: 20
  default_min_score: 7.0
  pass_accuracy_threshold: 0.6
  pass_calibration_threshold: 0.5

output:
  rankings_file: "rankings.md"
