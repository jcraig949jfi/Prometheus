agent:
  name: nous
  display_name: "Nous — Combinatorial Hypothesis Engine"
  version: "0.1.0"
  description: >
    Generates novel hypotheses by combining concepts from diverse fields.
    Uses NVIDIA NemoClaw free API to evaluate cross-domain concept triples,
    scores responses, and ranks combinations by potential.

runtime:
  python: ">=3.10"
  dependencies:
    - openai
    - pyyaml

api:
  provider: nvidia
  endpoint: "https://integrate.api.nvidia.com/v1/chat/completions"
  default_model: "qwen/qwen3.5-397b-a17b"
  auth_env: NVIDIA_API_KEY

parameters:
  n_combos: 500
  rate_limit_delay: 2.0
  max_retries: 5
  backoff_base: 2.0
  cross_field_bias: 0.8
  checkpoint_interval: 10

output:
  responses_file: "responses.jsonl"
  rankings_file: "rankings.md"
  top_ranked: 50
  top_full_text: 20
